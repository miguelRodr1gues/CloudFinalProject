name: CI/CD — Build & Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}








  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests for ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          mvn test -B -e 2>&1 | tail -100









  terraform:
    runs-on: ubuntu-latest
    needs: [gitleaks, test]
    env:
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    outputs:
      db_host: ${{ steps.tf_outputs.outputs.db_host }}
      sqs_url: ${{ steps.tf_outputs.outputs.sqs_url }}
      elastic_ip: ${{ steps.tf_outputs.outputs.elastic_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infrastructure/terraform init

      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform validate

      - name: Terraform fmt check
        run: terraform -chdir=infrastructure/terraform fmt -check

      - name: Terraform Plan
        run: terraform -chdir=infrastructure/terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform -chdir=infrastructure/terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf_outputs
        if: github.ref == 'refs/heads/main'
        run: |
          echo "db_host=$(terraform -chdir=infrastructure/terraform output -raw db_endpoint)" >> $GITHUB_OUTPUT
          echo "sqs_url=$(terraform -chdir=infrastructure/terraform output -raw sqs_queue_url)" >> $GITHUB_OUTPUT
          echo "elastic_ip=$(terraform -chdir=infrastructure/terraform output -raw elastic_ip)" >> $GITHUB_OUTPUT








  build:
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-central-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          no-cache: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          
          
            
            
            
            
            
            
            
            

  deploy:
    runs-on: ubuntu-latest
    needs: [build, terraform]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 400 ~/.ssh/deploy_key.pem

      - name: Update inventory with EC2 IP
        run: |
          sed -i 's/ansible_host: .*/ansible_host: ${{ needs.terraform.outputs.elastic_ip }}/' ansible/inventory/hosts.yml
          sed -i 's|ansible_ssh_private_key_file: .*|ansible_ssh_private_key_file: ~/.ssh/deploy_key.pem|' ansible/inventory/hosts.yml

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/deploy.yml \
            -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            -e "db_host=${{ needs.terraform.outputs.db_host }}" \
            -e "db_username=${{ secrets.DB_USERNAME }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "sqs_queue_url=${{ needs.terraform.outputs.sqs_url }}"
